name: Backend CI - RunZa

# Se dispara en cada push y en cada Pull Request hacia main.
# Esto es lo que reemplaza la "revisión manual": cada cambio de código
# corre automáticamente la suite de pruebas antes de poder integrarse.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests automatizados (pytest)
    runs-on: ubuntu-latest

    # Base de datos PostgreSQL real y efímera, igual que en producción,
    # para que las pruebas validen el comportamiento real del ORM.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runza_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/runza_test
      SECRET_KEY: ci-secret-key-solo-para-pruebas-no-usar-en-produccion
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:8081
      API_V1_PREFIX: /api/v1
      PROJECT_NAME: RunZa API
      VERSION: 1.0.0
      DEBUG: "true"

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Correr suite de pytest con cobertura
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-report.xml

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Subir resultados de pytest (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-report
          path: pytest-report.xml

  lint:
    name: Análisis estático (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar flake8
        run: pip install flake8

      - name: Bloquear solo errores graves (sintaxis, nombres indefinidos)
        run: flake8 app --select=E9,F63,F7,F82 --show-source

      - name: Reporte de estilo completo (informativo, no bloquea el pipeline)
        run: flake8 app --exit-zero --statistics
